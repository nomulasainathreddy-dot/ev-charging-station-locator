
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Station Details • EV Charge Locator</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="logo">⚡</div>
        <div>
          <div class="brand-title">Station Details</div>
          <div class="brand-sub">More info + booking</div>
        </div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="themeBtn">🌓</button>
        <a class="pill" href="index.html">Home</a>
      </div>
    </div>
  </header>

  <main class="container" style="padding:22px 0 44px;">
    <div id="stationDetails"></div>

    <div class="card" style="margin-top:14px;">
      <div class="card-head">
        <div>
          <h3>Location</h3>
          <p class="muted small">Map preview for this station</p>
        </div>
      </div>
      <div id="detailsMap" class="map"></div>
    </div>
  </main>

  <!-- Booking Modal same as home -->
  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal-card">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle">Book Slot</h3>
          <p class="muted small" id="modalSub">Select time and confirm</p>
        </div>
        <button class="icon-btn" id="closeModal">✖</button>
      </div>

      <div class="modal-body">
        <div class="grid2">
          <div class="field">
            <label>Date</label>
            <input type="date" id="bookDate" />
          </div>
          <div class="field">
            <label>Time</label>
            <select id="bookTime">
              <option>08:00</option><option>09:00</option><option>10:00</option>
              <option>11:00</option><option>12:00</option><option>13:00</option>
              <option>14:00</option><option>15:00</option><option>16:00</option>
              <option>17:00</option><option>18:00</option><option>19:00</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label>Vehicle Number (demo)</label>
          <input type="text" id="bookVehicle" placeholder="TS09AB1234" />
        </div>

        <div class="notice">
          This is a UI demo booking (no backend).
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn btn-ghost" id="cancelBook">Cancel</button>
        <button class="btn" id="confirmBook">Confirm Booking</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
